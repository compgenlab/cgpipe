name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build (no CGO, cross-compiled)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/compgenlab/cgpipe/internal/buildinfo.Version=${version}"
          bin="cgp-${version}-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build -trimpath -ldflags "${ldflags}" -o "dist/${bin}" ./cmd/cgpipe

      # Matrix jobs don't share a filesystem, so hand each binary off as an
      # artifact for the release job to collect and checksum together.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cgp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cgp-*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Emit one "<sha256>␠␠<filename>" line per binary (bare filenames, so the
      # file verifies with `sha256sum -c SHA256SUMS` from the download dir).
      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum cgp-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/cgp-*
            dist/SHA256SUMS
